name: Publish to MCP Registry

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # needed for OIDC-authenticated publish

jobs:
  publish:
    name: publish server.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync version in server.json with git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('server.json')); p.version='${tag}'; if (p.packages) p.packages.forEach(x=>x.version='${tag}'); fs.writeFileSync('server.json', JSON.stringify(p,null,2)+'\n');"
          cat server.json

      - name: Install MCP publisher CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/modelcontextprotocol/registry/main/scripts/install-publisher.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Authenticate via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish server.json
        run: mcp-publisher publish
