name: Publish to MCP Registry

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # needed for OIDC-authenticated publish

jobs:
  publish:
    name: publish server.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync version in server.json with git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('server.json')); p.version='${tag}'; if (p.packages) p.packages.forEach(x=>x.version='${tag}'); fs.writeFileSync('server.json', JSON.stringify(p,null,2)+'\n');"
          cat server.json

      - name: Install MCP publisher CLI
        run: |
          # Download the prebuilt binary from the registry's GitHub releases.
          # Pinned to a known-good tag; bump when a new publisher releases.
          PUB_VERSION="v1.6.0"
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/download/${PUB_VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin mcp-publisher
          chmod +x /usr/local/bin/mcp-publisher
          mcp-publisher --help | head -3

      - name: Authenticate via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish server.json
        run: |
          set +e
          output=$(mcp-publisher publish 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -eq 0 ]; then
            echo "::notice::Published successfully"
            exit 0
          fi
          # Tolerate the "already published" case — it means a manual
          # publish (or an earlier run on the same tag) already registered
          # this version, which is the desired end-state.
          if echo "$output" | grep -qi "duplicate version"; then
            echo "::notice::Version already published to MCP registry — treating as success"
            exit 0
          fi
          exit $exit_code
