name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: sophon-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: sophon-x86_64-apple-darwin.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: sophon-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: sophon-aarch64-unknown-linux-gnu.tar.gz
            linker_pkg: gcc-aarch64-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: sophon-x86_64-pc-windows-msvc.zip
    defaults:
      run:
        working-directory: sophon

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-linker (Linux aarch64 only)
        if: matrix.linker_pkg
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker_pkg }}
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} -p mcp-integration

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging="sophon-${{ matrix.target }}"
          mkdir -p "$staging"
          cp target/${{ matrix.target }}/release/sophon "$staging/"
          cp ../README.md ../LICENSE ../BENCHMARK.md "$staging/"
          tar czf "../${{ matrix.archive }}" "$staging"
          shasum -a 256 "../${{ matrix.archive }}" > "../${{ matrix.archive }}.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "sophon-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/sophon.exe" "$staging/"
          Copy-Item "../README.md","../LICENSE","../BENCHMARK.md" "$staging/"
          Compress-Archive -Path $staging -DestinationPath "../${{ matrix.archive }}"
          (Get-FileHash "../${{ matrix.archive }}" -Algorithm SHA256).Hash | Out-File "../${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  publish_release:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          body: |
            See [BENCHMARK.md](./BENCHMARK.md) for measured performance numbers and [README.md](./README.md) for install instructions.

  publish_npm:
    name: publish npm wrapper
    needs: publish_release
    runs-on: ubuntu-latest
    # Only attempt the npm publish when NPM_TOKEN is configured. A maintainer
    # who publishes manually from their own machine can leave the secret
    # unset and this job will cleanly skip instead of showing red.
    if: ${{ github.repository_owner != '' }}
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Check NPM_TOKEN availability
        id: have_token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "have=false" >> $GITHUB_OUTPUT
            echo "::notice::NPM_TOKEN secret is not configured — skipping npm publish (publish manually with 'npm publish --access public')."
          else
            echo "have=true" >> $GITHUB_OUTPUT
          fi
      - name: Sync npm package version with tag
        if: steps.have_token.outputs.have == 'true'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version='${tag}'; fs.writeFileSync('package.json', JSON.stringify(p,null,2));"
      - name: npm publish
        if: steps.have_token.outputs.have == 'true'
        run: |
          set +e
          output=$(npm publish --access public 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -eq 0 ]; then
            exit 0
          fi
          # Tolerate the "already published" case so reruns don't go red.
          if echo "$output" | grep -qi "cannot publish over the previously published versions"; then
            echo "::notice::Version already on npm — treating as success"
            exit 0
          fi
          exit $exit_code
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
